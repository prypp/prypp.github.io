<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>prypp — Theme Picker (10 options)</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Baloo+2:wght@400..800&family=Gloock&family=Comfortaa:wght@400..700&family=Fredoka:wght@400..600&family=Unbounded:wght@400..700&family=Quicksand:wght@400..700&family=Darumadrop+One&family=Gilda+Display&family=Nunito:wght@400..800&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Nunito",sans-serif;
    background:#f5f6fb;
    color:#3a4258;
    line-height:1.5;
    padding:clamp(20px,4vw,52px);
    -webkit-font-smoothing:antialiased;
  }
  .page-head{max-width:760px;margin:0 auto clamp(28px,5vw,52px)}
  .page-head .kick{font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:#9aa0b8;font-weight:700}
  .page-head h1{font-family:"Fraunces",serif;font-weight:500;font-size:clamp(30px,6vw,52px);line-height:1.05;margin:10px 0 12px;letter-spacing:-.02em}
  .page-head p{color:#737a93;font-size:clamp(15px,2vw,17px)}
  .page-head b{color:#3a4258}

  .grid{
    max-width:1280px;margin:0 auto;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
    gap:22px;
  }
  .card{
    border-radius:26px;overflow:hidden;position:relative;
    padding:30px 28px 26px;
    min-height:340px;
    display:flex;flex-direction:column;
    border:1px solid rgba(0,0,0,.05);
    box-shadow:0 18px 44px rgba(40,50,90,.10);
    transition:transform .4s cubic-bezier(.16,1,.3,1),box-shadow .4s;
  }
  .card:hover{transform:translateY(-6px);box-shadow:0 28px 60px rgba(40,50,90,.16)}

  .num{
    position:absolute;top:18px;right:20px;
    font-family:"Fraunces",serif;font-weight:600;font-size:15px;
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
  }
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;opacity:.7}
  .word{font-size:clamp(42px,7vw,58px);line-height:.95;margin:14px 0 4px;letter-spacing:-.02em}
  .word .dot{font-style:normal}
  .tag{font-size:13.5px;font-weight:600;opacity:.78;margin-bottom:18px}

  .tiles{display:flex;gap:10px;margin-top:auto}
  .tile{flex:1;height:74px;border-radius:14px;border:1px solid rgba(255,255,255,.4)}

  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:18px;gap:12px}
  .pill{padding:10px 18px;border-radius:100px;font-size:13px;font-weight:700;white-space:nowrap}
  .name{font-family:"Fraunces",serif;font-style:italic;font-size:18px;font-weight:500}

  .hint{max-width:1280px;margin:34px auto 0;text-align:center;color:#8a90a8;font-size:15px}
  .hint b{color:#3a4258}
</style>
</head>
<body>
  <div class="page-head">
    <div class="kick">prypp · theme picker</div>
    <h1>เลือกธีมที่ชอบ — บอกเบอร์ได้เลย 🎨</h1>
    <p>10 ธีม เน้น<b>น่ารัก</b>แต่ยัง<b>ครีเอทีฟ</b> ตั้งแต่พาสเทลหวานนุ่ม ไปจนแนวป๊อปเล่นสนุก และดาร์กน่ารัก 1 อัน — แต่ละการ์ดโชว์สีจริง + ฟอนต์จริง</p>
  </div>

  <div class="grid" id="grid"></div>

  <div class="hint">ชอบเบอร์ไหน พิมพ์มาเลย เช่น <b>"เอาเบอร์ 6"</b> — เดี๋ยวผมเอาไปใส่หน้าเว็บจริงให้ทันที ✨</div>

<script>
const themes = [
  { name:"Cotton Candy", font:"'Fraunces',serif", bg:"radial-gradient(120% 120% at 15% 10%,#ffe0ee,transparent 60%),radial-gradient(120% 120% at 90% 90%,#dbe7ff,transparent 60%),linear-gradient(150deg,#fff4f9,#eef3ff)",
    ink:"#5b4a63", dim:"#9a8aa6", accent:"#ff8fc7", accent2:"#7fb3ff",
    tiles:["radial-gradient(at 30% 20%,#ffc4e0,transparent),linear-gradient(135deg,#ffe7f2,#f2e9ff)","radial-gradient(at 70% 30%,#bcd7ff,transparent),linear-gradient(135deg,#e6f0ff,#f5ecff)","radial-gradient(at 50% 80%,#e3ccff,transparent),linear-gradient(135deg,#f3ebff,#ffeef7)"] },

  { name:"Matcha Latte", font:"'Baloo 2',cursive", bg:"radial-gradient(120% 120% at 20% 15%,#e2eecb,transparent 60%),radial-gradient(120% 120% at 88% 92%,#efe2cf,transparent 60%),linear-gradient(150deg,#f6f8ec,#fbf4e9)",
    ink:"#4d5942", dim:"#8e9880", accent:"#94c25a", accent2:"#d8b48a",
    tiles:["radial-gradient(at 30% 25%,#c4e08f,transparent),linear-gradient(135deg,#e6f1cf,#f3f7e2)","radial-gradient(at 70% 30%,#d7e8b0,transparent),linear-gradient(135deg,#eef3dd,#f7f2e4)","radial-gradient(at 50% 80%,#ecd6b3,transparent),linear-gradient(135deg,#f6ecda,#eef2da)"] },

  { name:"Peach Fuzz", font:"'Gloock',serif", bg:"radial-gradient(120% 120% at 18% 12%,#ffd9c4,transparent 60%),radial-gradient(120% 120% at 88% 90%,#ffe6d0,transparent 60%),linear-gradient(150deg,#fff4ec,#fff0f0)",
    ink:"#6b4a44", dim:"#b39288", accent:"#ff8f66", accent2:"#ffc09a",
    tiles:["radial-gradient(at 30% 22%,#ffc6a6,transparent),linear-gradient(135deg,#ffe4d3,#fff0e6)","radial-gradient(at 72% 30%,#ffb59a,transparent),linear-gradient(135deg,#ffe0d2,#fff1ea)","radial-gradient(at 50% 80%,#ffd9c2,transparent),linear-gradient(135deg,#fff0e8,#ffe8e8)"] },

  { name:"Lavender Haze", font:"'Comfortaa',cursive", bg:"radial-gradient(120% 120% at 16% 12%,#e6dcff,transparent 60%),radial-gradient(120% 120% at 90% 88%,#f0d9ff,transparent 60%),linear-gradient(150deg,#f5f0ff,#fbf0ff)",
    ink:"#544a6b", dim:"#9a8fb5", accent:"#a88fff", accent2:"#d6bcff",
    tiles:["radial-gradient(at 30% 22%,#d4c4ff,transparent),linear-gradient(135deg,#ece2ff,#f6edff)","radial-gradient(at 70% 30%,#e6c9ff,transparent),linear-gradient(135deg,#f2e6ff,#fceefd)","radial-gradient(at 50% 80%,#c9c4ff,transparent),linear-gradient(135deg,#e8e6ff,#f3ecff)"] },

  { name:"Lemon Butter", font:"'Fredoka',sans-serif", bg:"radial-gradient(120% 120% at 18% 14%,#fff0b8,transparent 60%),radial-gradient(120% 120% at 88% 90%,#e6f0c4,transparent 60%),linear-gradient(150deg,#fffbe6,#f7f9e8)",
    ink:"#5e5836", dim:"#aaa37e", accent:"#f5c63a", accent2:"#bcd99a",
    tiles:["radial-gradient(at 30% 22%,#ffe78a,transparent),linear-gradient(135deg,#fff4c2,#fbf6d8)","radial-gradient(at 70% 30%,#dcecae,transparent),linear-gradient(135deg,#eef3d4,#f8f7da)","radial-gradient(at 50% 80%,#ffe9a0,transparent),linear-gradient(135deg,#fff3cc,#f3f5cf)"] },

  { name:"Bubblegum Pop", font:"'Unbounded',sans-serif", bg:"radial-gradient(120% 120% at 16% 10%,#ffd2ec,transparent 58%),radial-gradient(120% 120% at 90% 88%,#c4f3ee,transparent 58%),linear-gradient(150deg,#fff0f8,#f0fbff)",
    ink:"#4a3550", dim:"#a888b0", accent:"#ff5fa2", accent2:"#3fd0c8",
    tiles:["radial-gradient(at 30% 22%,#ff9ecb,transparent),linear-gradient(135deg,#ffd9ec,#ffe9f5)","radial-gradient(at 70% 30%,#8fe8e0,transparent),linear-gradient(135deg,#d4f6f2,#e6fbff)","radial-gradient(at 50% 80%,#ffe07a,transparent),linear-gradient(135deg,#fff2c2,#ffe6f0)"] },

  { name:"Mint Soda", font:"'Quicksand',sans-serif", bg:"radial-gradient(120% 120% at 18% 14%,#c8f4e4,transparent 60%),radial-gradient(120% 120% at 88% 90%,#c4e8ff,transparent 60%),linear-gradient(150deg,#ecfbf5,#eef8ff)",
    ink:"#33564f", dim:"#7fa59c", accent:"#2fd0ac", accent2:"#7fccff",
    tiles:["radial-gradient(at 30% 22%,#9fe9d4,transparent),linear-gradient(135deg,#d4f5ea,#e6fbf4)","radial-gradient(at 70% 30%,#a6dcff,transparent),linear-gradient(135deg,#d6eeff,#eaf6ff)","radial-gradient(at 50% 80%,#b8f0dd,transparent),linear-gradient(135deg,#e0f8ef,#e6f4ff)"] },

  { name:"Strawberry Milk", font:"'Darumadrop One',cursive", bg:"radial-gradient(120% 120% at 16% 12%,#ffd5de,transparent 60%),radial-gradient(120% 120% at 90% 90%,#ffe8ec,transparent 60%),linear-gradient(150deg,#fff3f5,#fff7f0)",
    ink:"#6b3f49", dim:"#c49aa2", accent:"#ff7a98", accent2:"#ffc0cb",
    tiles:["radial-gradient(at 30% 22%,#ffb3c4,transparent),linear-gradient(135deg,#ffdde4,#ffeef0)","radial-gradient(at 70% 30%,#ffd0d0,transparent),linear-gradient(135deg,#ffe6e6,#fff2ec)","radial-gradient(at 50% 80%,#ff9fb3,transparent),linear-gradient(135deg,#ffd9e0,#ffeaf0)"] },

  { name:"Blueberry Cream", font:"'Gilda Display',serif", bg:"radial-gradient(120% 120% at 18% 12%,#d4d9ff,transparent 60%),radial-gradient(120% 120% at 88% 90%,#efe6d8,transparent 60%),linear-gradient(150deg,#f0f2ff,#fbf6ee)",
    ink:"#3f4570", dim:"#9095bf", accent:"#7c83ff", accent2:"#cdb89a",
    tiles:["radial-gradient(at 30% 22%,#b8c0ff,transparent),linear-gradient(135deg,#dde1ff,#eef0ff)","radial-gradient(at 70% 30%,#c4cbff,transparent),linear-gradient(135deg,#e2e5ff,#f6f1e8)","radial-gradient(at 50% 80%,#e6d6bf,transparent),linear-gradient(135deg,#f3ebda,#e6e8ff)"] },

  { name:"Midnight Candy", font:"'Baloo 2',cursive", dark:true, bg:"radial-gradient(120% 120% at 15% 10%,#3a2f5e,transparent 60%),radial-gradient(120% 120% at 90% 90%,#5e2f52,transparent 55%),linear-gradient(150deg,#221d36,#1a1730)",
    ink:"#f1ecff", dim:"#a99fce", accent:"#ff9ec7", accent2:"#8fe3ff",
    tiles:["radial-gradient(at 30% 22%,#ff9ec7,transparent),linear-gradient(135deg,#3a2a4e,#2a2240)","radial-gradient(at 70% 30%,#8fe3ff,transparent),linear-gradient(135deg,#2a3450,#241f3a)","radial-gradient(at 50% 80%,#c9a8ff,transparent),linear-gradient(135deg,#352a52,#241f3a)"] },
];

const grid = document.getElementById('grid');
themes.forEach((t,i)=>{
  const lineColor = t.dark ? "rgba(255,255,255,.10)" : "rgba(0,0,0,.05)";
  const numBg = t.dark ? "rgba(255,255,255,.12)" : "rgba(255,255,255,.6)";
  const card = document.createElement('div');
  card.className='card';
  card.style.background = t.bg;
  card.style.color = t.ink;
  card.style.borderColor = lineColor;
  card.innerHTML = `
    <div class="num" style="background:${numBg};color:${t.accent}">${i+1}</div>
    <div class="eyebrow" style="color:${t.dim}">Digital Artist · Maker</div>
    <div class="word" style="font-family:${t.font}">pry<span style="color:${t.dim}">pp</span><span class="dot" style="color:${t.accent}">.</span></div>
    <div class="tag" style="color:${t.dim}">Painting in pixels &amp; <span style="color:${t.accent};font-style:italic">light.</span></div>
    <div class="tiles">
      <div class="tile" style="background:${t.tiles[0]}"></div>
      <div class="tile" style="background:${t.tiles[1]}"></div>
      <div class="tile" style="background:${t.tiles[2]}"></div>
    </div>
    <div class="foot">
      <span class="name" style="font-family:${t.font};color:${t.ink}">${t.name}</span>
      <span class="pill" style="background:${t.accent};color:${t.dark?'#1a1730':'#fff'}">View work →</span>
    </div>`;
  grid.appendChild(card);
});
</script>
</body>
</html>
